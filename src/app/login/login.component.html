<section class="vh-100" style="background-color: #f5f7f8;">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card shadow-2-strong" style="border-radius: 1rem;">
          <div class="card-body p-5 text-center">
            
            
              <h3 class="mb-5">Sign in</h3>

              <!-- Username -->
              <div class="form-outline mb-4">
                <div class="wave-group">
                  <input 
                    type="text" 
                   [(ngModel)]="username"
                    class="input" 
                  
                  
                  >
                  <span class="bar"></span>
                  <label class="label">
                    <span class="label-char" style="--index: 0">U</span>
                    <span class="label-char" style="--index: 1">s</span>
                    <span class="label-char" style="--index: 2">e</span>
                    <span class="label-char" style="--index: 3">r</span>
                    <span class="label-char" style="--index: 4">n</span>
                    <span class="label-char" style="--index: 5">a</span>
                    <span class="label-char" style="--index: 6">m</span>
                    <span class="label-char" style="--index: 7">e</span>
                  </label>
                </div>
                <!-- <div *ngIf=" userForm.controls['username'].errors" class="text-danger mt-1 small">
                  Username is required
                </div> -->
              </div>

              <!-- Password -->
              <div class="form-outline mb-4">
                <div class="wave-group">
                  <input 
                    type="password" 
                   [(ngModel)]="password"
                    class="input" 
                    
                   
                  >
                  <span class="bar"></span>
                  <label class="label">
                    <span class="label-char" style="--index: 0">P</span>
                    <span class="label-char" style="--index: 1">a</span>
                    <span class="label-char" style="--index: 2">s</span>
                    <span class="label-char" style="--index: 3">s</span>
                    <span class="label-char" style="--index: 4">w</span>
                    <span class="label-char" style="--index: 5">o</span>
                    <span class="label-char" style="--index: 6">r</span>
                    <span class="label-char" style="--index: 7">d</span>
                  </label>
                </div>
                <!-- <div *ngIf="userForm.controls['password'].errors" class="text-danger mt-1 small">
                  Password is required
                </div> -->
              </div>

              <!-- Remember me -->
              <div class="form-check d-flex justify-content-start mb-4">
                <input class="form-check-input" type="checkbox" formControlName="rememberMe" id="rememberMe" />
                <label class="form-check-label" for="rememberMe"> Remember password </label>
              </div>

              <button type="submit" class="btn btn-primary btn-lg btn-block" (click)="onSubmit()">Login</button>
         
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
